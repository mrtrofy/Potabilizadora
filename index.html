<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="shortcut icon" href="pngtree-water-splash-drop-logo-png-image_5279737.ico" type="image/x-icon">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaControl Cloud - Sistema de Gestión</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- SDK de Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .animate-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyDIp95fqGFn2mgJ_031a1Y_JfeKECKZTOk",
            authDomain: "potabilizadora-65aeb.firebaseapp.com",
            projectId: "potabilizadora-65aeb",
            storageBucket: "potabilizadora-65aeb.firebasestorage.app",
            messagingSenderId: "503467709475",
            appId: "1:503467709475:web:dcad5aa24d0bf9d23acd96"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();

        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                droplets: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 22a7 7 0 0 0 7-7c0-2-1-3.9-3-5.5s-3.5-4-4-6.5c-.5 2.5-2 4.9-4 6.5C6 11.1 5 13 5 15a7 7 0 0 0 7 7z"/></svg>,
                dashboard: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>,
                plus: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="M12 8v8"/><path d="M8 12h8"/></svg>,
                logout: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>,
                printer: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect width="12" height="8" x="6" y="14"/></svg>,
                trend: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>,
                truck: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M10 17h4V5H2v12h3"/><circle cx="7" cy="17" r="2"/><path d="M15 17h5l3-3v-7h-8v10Z"/><circle cx="18" cy="17" r="2"/></svg>,
                shield: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10Z"/></svg>
            };
            return icons[name] || null;
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [records, setRecords] = useState([]);
            const [view, setView] = useState('dashboard');
            const [authForm, setAuthForm] = useState({ username: '', password: '' });
            const [formData, setFormData] = useState({
                type: 'venta', category: 'garrafon', customer: '', quantity: '', amount: '', ph: '7.0', tds: '', description: ''
            });

            useEffect(() => {
                if (!user) return;
                // Eliminamos el orderBy temporalmente para descartar error de índices
                const unsubscribe = db.collection('registros')
                    .onSnapshot((snapshot) => {
                        const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        // Ordenamos localmente para evitar que Firebase pida crear un índice manual
                        const sortedData = data.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
                        setRecords(sortedData);
                    }, (error) => {
                        console.error("Error en tiempo real:", error.message);
                    });
                return () => unsubscribe();
            }, [user]);

            const handleLogin = (e) => {
                e.preventDefault();
                if (authForm.username === 'admin' && authForm.password === 'admin123') {
                    setUser({ role: 'admin', name: 'Administrador' });
                } else if (authForm.username === 'empleado1' && authForm.password === 'admin123') {
                    setUser({ role: 'user', name: 'Operador 1' });
                } else {
                    alert('Usuario no válido');
                }
            };

            const handleSubmitRecord = async (e) => {
                e.preventDefault();
                try {
                    const nuevoRegistro = {
                        ...formData,
                        amount: Number(formData.amount),
                        quantity: Number(formData.quantity),
                        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                        timestampStr: new Date().toLocaleString(),
                        createdBy: user.name
                    };
                    
                    await db.collection('registros').add(nuevoRegistro);
                    console.log("¡Guardado con éxito!");
                    
                    setFormData({ type: 'venta', category: 'garrafon', customer: '', quantity: '', amount: '', ph: '7.0', tds: '', description: '' });
                    setView('dashboard');
                } catch (err) {
                    console.error("Error al guardar en Firebase:", err.code, err.message);
                    alert("Error de Firebase: " + err.message);
                }
            };

            if (!user) {
                return (
                    <div className="min-h-screen bg-slate-900 flex items-center justify-center p-4">
                        <div className="bg-white p-10 rounded-[2rem] shadow-2xl w-full max-w-md animate-in">
                            <div className="flex flex-col items-center mb-8">
                                <Icon name="droplets" size={40} className="text-blue-600 mb-2" />
                                <h1 className="text-2xl font-black text-slate-800">AquaControl Login</h1>
                            </div>
                            <form onSubmit={handleLogin} className="space-y-4">
                                <input type="text" placeholder="Usuario" className="w-full p-4 bg-slate-100 rounded-xl font-bold outline-none" onChange={e => setAuthForm({...authForm, username: e.target.value})} />
                                <input type="password" placeholder="Contraseña" className="w-full p-4 bg-slate-100 rounded-xl font-bold outline-none" onChange={e => setAuthForm({...authForm, password: e.target.value})} />
                                <button className="w-full bg-blue-600 text-white font-black py-4 rounded-xl shadow-lg">ENTRAR</button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col md:flex-row">
                    {/* Sidebar */}
                    <nav className="w-full md:w-64 bg-slate-900 text-white p-6 flex flex-col shrink-0">
                        <div className="flex items-center gap-2 mb-10">
                            <Icon name="droplets" className="text-blue-400" />
                            <span className="font-black text-xl tracking-tighter">AQUACLOUD</span>
                        </div>
                        <div className="flex-1 space-y-2">
                            <button onClick={() => setView('dashboard')} className={`w-full flex items-center gap-3 p-4 rounded-xl font-bold ${view === 'dashboard' ? 'bg-blue-600' : 'text-slate-400'}`}>
                                <Icon name="dashboard" /> Dashboard
                            </button>
                            <button onClick={() => setView('register')} className={`w-full flex items-center gap-3 p-4 rounded-xl font-bold ${view === 'register' ? 'bg-blue-600' : 'text-slate-400'}`}>
                                <Icon name="plus" /> Nuevo Registro
                            </button>
                        </div>
                        <button onClick={() => setUser(null)} className="mt-auto p-4 text-red-400 font-bold flex items-center gap-2">
                            <Icon name="logout" /> Salir
                        </button>
                    </nav>

                    {/* Contenido */}
                    <main className="flex-1 p-8 md:p-12 bg-slate-50 overflow-y-auto">
                        {view === 'register' ? (
                            <div className="max-w-xl mx-auto bg-white rounded-[2rem] shadow-xl overflow-hidden animate-in">
                                <div className="bg-blue-600 p-6 text-white font-black text-xl">Registrar Venta</div>
                                <form onSubmit={handleSubmitRecord} className="p-8 space-y-4">
                                    <input type="text" placeholder="Cliente" className="w-full p-4 bg-slate-50 rounded-xl font-bold" value={formData.customer} onChange={e => setFormData({...formData, customer: e.target.value})} required />
                                    <div className="grid grid-cols-2 gap-4">
                                        <input type="number" placeholder="Cantidad" className="p-4 bg-slate-50 rounded-xl font-bold" value={formData.quantity} onChange={e => setFormData({...formData, quantity: e.target.value})} required />
                                        <input type="number" step="0.01" placeholder="Monto $" className="p-4 bg-blue-50 text-blue-600 rounded-xl font-black" value={formData.amount} onChange={e => setFormData({...formData, amount: e.target.value})} required />
                                    </div>
                                    <button className="w-full py-4 bg-blue-600 text-white rounded-xl font-black shadow-lg">GUARDAR EN LA NUBE</button>
                                </form>
                            </div>
                        ) : (
                            <div className="space-y-8 animate-in">
                                <div className="flex justify-between items-end">
                                    <h2 className="text-4xl font-black text-slate-900">Panel Principal</h2>
                                    <button onClick={() => window.print()} className="bg-slate-900 text-white px-6 py-3 rounded-xl font-bold flex items-center gap-2">
                                        <Icon name="printer" /> Reporte
                                    </button>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                    <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                                        <p className="text-xs font-black text-slate-400 uppercase">Ventas Hoy</p>
                                        <p className="text-3xl font-black text-slate-900 mt-1">
                                            ${records.reduce((acc, r) => acc + Number(r.amount || 0), 0).toFixed(2)}
                                        </p>
                                    </div>
                                    <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                                        <p className="text-xs font-black text-slate-400 uppercase">Registros</p>
                                        <p className="text-3xl font-black text-slate-900 mt-1">{records.length}</p>
                                    </div>
                                    <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                                        <div className="flex items-center gap-2">
                                            <div className="w-2 h-2 bg-green-500 rounded-full"></div>
                                            <p className="text-xs font-black text-green-600 uppercase">Sistema Online</p>
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-100">
                                    <table className="w-full text-left">
                                        <thead className="bg-slate-50 text-[10px] uppercase font-black text-slate-400">
                                            <tr>
                                                <th className="px-8 py-4">Fecha</th>
                                                <th className="px-8 py-4">Cliente</th>
                                                <th className="px-8 py-4 text-right">Monto</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-50">
                                            {records.length === 0 ? (
                                                <tr><td colSpan="3" className="p-20 text-center text-slate-300 font-bold italic">No hay datos en la base de datos...</td></tr>
                                            ) : (
                                                records.map(r => (
                                                    <tr key={r.id} className="hover:bg-blue-50 transition">
                                                        <td className="px-8 py-5 text-xs text-slate-400 font-bold">{r.timestampStr}</td>
                                                        <td className="px-8 py-5 font-black text-slate-800">{r.customer}</td>
                                                        <td className="px-8 py-5 text-right font-black text-blue-600">${Number(r.amount).toFixed(2)}</td>
                                                    </tr>
                                                ))
                                            )}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
