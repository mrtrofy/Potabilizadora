<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="shortcut icon" href="pngtree-water-splash-drop-logo-png-image_5279737.ico" type="image/x-icon">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaControl Cloud - Sistema de Gestión</title>
    <!-- Tailwind CSS para el diseño -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React y Babel para ejecutar JSX en el navegador -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; }
        .animate-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- CONFIGURACIÓN DE FIREBASE ---
        // Estas variables se llenan automáticamente en este entorno. 
        // Si lo usas fuera, recuerda reemplazar __firebase_config con tu objeto de configuración.
        const firebaseConfig = {
  apiKey: "AIzaSyDIp95fqGFn2mgJ_031a1Y_JfeKECKZTOk",
  authDomain: "potabilizadora-65aeb.firebaseapp.com",
  projectId: "potabilizadora-65aeb",
  storageBucket: "potabilizadora-65aeb.firebasestorage.app",
  messagingSenderId: "503467709475",
  appId: "1:503467709475:web:dcad5aa24d0bf9d23acd96",
  measurementId: "G-E3TE034RV5"
};
        // Componente de Icono para simplificar Lucide en React
        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [authForm, setAuthForm] = useState({ username: '', password: '' });
            const [loginError, setLoginError] = useState('');
            const [records, setRecords] = useState([]);
            const [view, setView] = useState('dashboard');
            const [formData, setFormData] = useState({
                type: 'venta',
                category: 'garrafon',
                customer: '',
                quantity: '',
                amount: '',
                ph: '7.0',
                tds: '',
                description: ''
            });

            useEffect(() => {
                const initAuth = async () => {
                    try {
                        await auth.signInAnonymously();
                    } catch (err) {
                        console.error("Error de auth:", err);
                    }
                };
                initAuth();

                const unsubscribe = auth.onAuthStateChanged((firebaseUser) => {
                    setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!auth.currentUser) return;

                const recordsRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('operaciones');
                
                const unsubscribe = recordsRef.onSnapshot((snapshot) => {
                    const data = snapshot.docs.map(doc => ({
                        id: doc.id,
                        ...doc.data()
                    }));
                    const sorted = data.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
                    setRecords(sorted);
                }, (error) => {
                    console.error("Error leyendo Firestore:", error);
                });

                return () => unsubscribe();
            }, [loading]);

            const handleLogin = (e) => {
                e.preventDefault();
                if (authForm.username === 'admin' && authForm.password === 'admin123') {
                    setUser({ role: 'admin', name: 'Administrador' });
                    setView('admin');
                } else if (authForm.username === 'empleado1' && authForm.password === 'admin123') {
                    setUser({ role: 'user', name: 'Operador de Turno' });
                    setView('dashboard');
                } else {
                    setLoginError('Usuario o contraseña incorrectos.');
                }
            };

            const handleSubmitRecord = async (e) => {
                e.preventDefault();
                try {
                    const recordsRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('operaciones');
                    await recordsRef.add({
                        ...formData,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                        timestampStr: new Date().toLocaleString(),
                        createdBy: user.name
                    });
                    setFormData({ type: 'venta', category: 'garrafon', customer: '', quantity: '', amount: '', ph: '7.0', tds: '', description: '' });
                    setView(user.role === 'admin' ? 'admin' : 'dashboard');
                } catch (err) {
                    console.error("Error guardando:", err);
                }
            };

            if (loading) return <div className="min-h-screen flex items-center justify-center"><Icon name="loader-2" className="animate-spin text-blue-600" size={40} /></div>;

            if (!user) {
                return (
                    <div className="min-h-screen bg-slate-100 flex items-center justify-center p-4">
                        <div className="max-w-md w-full bg-white rounded-[2rem] shadow-2xl p-10">
                            <div className="flex flex-col items-center mb-8">
                                <div className="bg-blue-600 p-4 rounded-2xl mb-4"><Icon name="droplets" className="text-white" size={32} /></div>
                                <h1 className="text-2xl font-black">Acceso Cloud</h1>
                                <p className="text-slate-400 text-sm">Gestión de Potabilizadora</p>
                            </div>
                            <form onSubmit={handleLogin} className="space-y-4">
                                <input type="text" className="w-full px-6 py-4 bg-slate-50 rounded-xl outline-none focus:ring-2 ring-blue-500 transition" placeholder="Usuario" value={authForm.username} onChange={e => setAuthForm({...authForm, username: e.target.value})} />
                                <input type="password" className="w-full px-6 py-4 bg-slate-50 rounded-xl outline-none focus:ring-2 ring-blue-500 transition" placeholder="Contraseña" value={authForm.password} onChange={e => setAuthForm({...authForm, password: e.target.value})} />
                                {loginError && <p className="text-red-500 text-xs font-bold">{loginError}</p>}
                                <button className="w-full bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-blue-700 transition active:scale-95 uppercase tracking-wider">Entrar</button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col md:flex-row">
                    {/* Sidebar */}
                    <nav className="w-full md:w-64 bg-slate-900 text-white p-6 flex flex-col">
                        <div className="flex items-center gap-3 mb-10">
                            <Icon name="droplets" className="text-blue-400" />
                            <span className="font-black text-xl">AQUA CLOUD</span>
                        </div>
                        <div className="flex-1 space-y-2">
                            <button onClick={() => setView(user.role === 'admin' ? 'admin' : 'dashboard')} className={`w-full flex items-center gap-3 p-4 rounded-xl transition ${view !== 'register' ? 'bg-blue-600' : 'hover:bg-slate-800 text-slate-400'}`}><Icon name="layout-dashboard" /> Dashboard</button>
                            <button onClick={() => setView('register')} className={`w-full flex items-center gap-3 p-4 rounded-xl transition ${view === 'register' ? 'bg-blue-600' : 'hover:bg-slate-800 text-slate-400'}`}><Icon name="plus-circle" /> Nuevo Registro</button>
                        </div>
                        <div className="mt-auto pt-4 border-t border-slate-800">
                            <p className="text-xs text-slate-500 uppercase font-bold mb-1">Usuario</p>
                            <p className="font-bold text-blue-400 mb-4">{user.name}</p>
                            <button onClick={() => setUser(null)} className="w-full flex items-center gap-3 p-3 text-red-400 hover:bg-red-500/10 rounded-xl transition"><Icon name="log-out" /> Salir</button>
                        </div>
                    </nav>

                    {/* Content */}
                    <main className="flex-1 p-6 md:p-10 overflow-y-auto">
                        {view === 'register' ? (
                            <div className="max-w-xl mx-auto bg-white rounded-[2rem] shadow-xl overflow-hidden animate-in">
                                <div className="bg-blue-600 p-8 text-white">
                                    <h2 className="text-2xl font-black">Nuevo Registro</h2>
                                    <p className="text-blue-100 text-sm opacity-80 uppercase tracking-widest font-bold">Captura de Operación</p>
                                </div>
                                <form onSubmit={handleSubmitRecord} className="p-8 space-y-6">
                                    <div className="grid grid-cols-2 gap-4">
                                        <select className="p-4 bg-slate-50 rounded-xl font-bold outline-none border-2 border-transparent focus:border-blue-500" value={formData.type} onChange={e => setFormData({...formData, type: e.target.value})}>
                                            <option value="venta">Venta</option>
                                            <option value="calidad">Calidad</option>
                                        </select>
                                        {formData.type === 'venta' && (
                                            <select className="p-4 bg-slate-50 rounded-xl font-bold outline-none border-2 border-transparent focus:border-blue-500" value={formData.category} onChange={e => setFormData({...formData, category: e.target.value})}>
                                                <option value="garrafon">Garrafón</option>
                                                <option value="cisterna">Cisterna</option>
                                            </select>
                                        )}
                                    </div>
                                    {formData.type === 'venta' ? (
                                        <div className="space-y-4">
                                            <input type="text" required className="w-full p-4 bg-slate-50 rounded-xl font-bold outline-none" placeholder="Nombre del Cliente" value={formData.customer} onChange={e => setFormData({...formData, customer: e.target.value})} />
                                            <div className="grid grid-cols-2 gap-4">
                                                <input type="number" required className="p-4 bg-slate-50 rounded-xl font-bold outline-none" placeholder="Cantidad" value={formData.quantity} onChange={e => setFormData({...formData, quantity: e.target.value})} />
                                                <input type="number" step="0.01" required className="p-4 bg-blue-50 text-blue-600 rounded-xl font-black outline-none" placeholder="Monto $" value={formData.amount} onChange={e => setFormData({...formData, amount: e.target.value})} />
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="grid grid-cols-2 gap-4">
                                            <input type="number" step="0.1" className="p-4 bg-slate-50 rounded-xl font-bold outline-none" placeholder="pH (Ej: 7.2)" value={formData.ph} onChange={e => setFormData({...formData, ph: e.target.value})} />
                                            <input type="number" className="p-4 bg-slate-50 rounded-xl font-bold outline-none" placeholder="TDS (PPM)" value={formData.tds} onChange={e => setFormData({...formData, tds: e.target.value})} />
                                        </div>
                                    )}
                                    <div className="flex gap-4 pt-4">
                                        <button type="button" onClick={() => setView(user.role === 'admin' ? 'admin' : 'dashboard')} className="flex-1 p-4 border-2 border-slate-100 rounded-xl font-bold text-slate-400 hover:bg-slate-50">Cancelar</button>
                                        <button className="flex-[2] p-4 bg-blue-600 text-white rounded-xl font-black shadow-lg shadow-blue-200">GUARDAR EN NUBE</button>
                                    </div>
                                </form>
                            </div>
                        ) : (
                            <div className="space-y-8 animate-in">
                                <header className="flex justify-between items-end">
                                    <div>
                                        <h2 className="text-3xl font-black text-slate-800">Panel Operativo</h2>
                                        <p className="text-slate-400 font-medium">Sincronización en tiempo real activa</p>
                                    </div>
                                    {user.role === 'admin' && (
                                        <button onClick={() => window.print()} className="flex items-center gap-2 bg-slate-900 text-white px-6 py-3 rounded-xl font-bold text-sm"><Icon name="printer" size={16} /> Imprimir</button>
                                    )}
                                </header>

                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                    <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                                        <Icon name="trending-up" className="text-green-500 mb-2" />
                                        <p className="text-xs text-slate-400 font-bold uppercase tracking-widest">Hoy</p>
                                        <p className="text-2xl font-black text-slate-900">${records.filter(r => r.type === 'venta').reduce((acc, curr) => acc + Number(curr.amount || 0), 0).toFixed(2)}</p>
                                    </div>
                                    <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                                        <Icon name="truck" className="text-blue-500 mb-2" />
                                        <p className="text-xs text-slate-400 font-bold uppercase tracking-widest">Operaciones</p>
                                        <p className="text-2xl font-black text-slate-900">{records.length}</p>
                                    </div>
                                    <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                                        <Icon name="shield-check" className="text-purple-500 mb-2" />
                                        <p className="text-xs text-slate-400 font-bold uppercase tracking-widest">Nube</p>
                                        <p className="text-xl font-black text-green-500 uppercase">Conectado</p>
                                    </div>
                                </div>

                                <div className="bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-100">
                                    <table className="w-full text-left">
                                        <thead className="bg-slate-50 text-[10px] uppercase font-black text-slate-400 tracking-widest">
                                            <tr>
                                                <th className="px-6 py-4">Fecha/Hora</th>
                                                <th className="px-6 py-4">Tipo</th>
                                                <th className="px-6 py-4">Detalle</th>
                                                <th className="px-6 py-4 text-right">Monto</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {records.map(r => (
                                                <tr key={r.id} className="hover:bg-slate-50 transition">
                                                    <td className="px-6 py-4 text-xs font-mono text-slate-400">{r.timestampStr || 'Reciente...'}</td>
                                                    <td className="px-6 py-4">
                                                        <span className={`px-2 py-1 rounded-md text-[10px] font-bold uppercase ${r.type === 'venta' ? 'bg-blue-100 text-blue-600' : 'bg-purple-100 text-purple-600'}`}>{r.type}</span>
                                                    </td>
                                                    <td className="px-6 py-4">
                                                        <p className="font-bold text-slate-700">{r.customer || 'Análisis de Planta'}</p>
                                                        <p className="text-[10px] text-slate-400">{r.category || 'Técnico'}</p>
                                                    </td>
                                                    <td className="px-6 py-4 text-right font-black text-slate-900">${r.amount || '0.00'}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
